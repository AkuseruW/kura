name: Publish npm packages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    if: github.repository == 'AkuseruW/kura'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: bun run scripts/verify-release-tag.ts

      - name: Verify npm versions are unpublished
        run: |
          version="${GITHUB_REF_NAME#v}"

          for package in "@akuseru_w/kura" "create-kura-app"; do
            if npm view "$package@$version" version >/dev/null 2>&1; then
              echo "::error::$package@$version already exists on npm"
              exit 1
            fi
          done

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Publish runtime package
        run: npm publish --access public --provenance

      - name: Publish create app package
        run: npm publish --access public --provenance
        working-directory: packages/create-kura-app
